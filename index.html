<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SnapBrief — News in 60 Words</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;--bg4:#252525;--border:#2a2a2a;--text:#f0f0f0;--text2:#aaa;--text3:#666;--accent:#e63946;--accent2:#ff6b6b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:22px;font-weight:800;letter-spacing:-1px}.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.live-dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;animation:pulse 1.5s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.search-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:none}
.search-bar.open{display:block}
.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:8px 14px;gap:8px}
.search-wrap input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none}
.cats{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;border-bottom:1px solid var(--border);scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{white-space:nowrap;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .2s}
.cat.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ticker-wrap{background:#1a0505;border-bottom:1px solid #3a1010;padding:8px 16px;display:flex;align-items:center;gap:10px;overflow:hidden}
.ticker-label{font-size:10px;font-weight:700;background:var(--accent);padding:3px 8px;border-radius:4px;white-space:nowrap;color:#fff;flex-shrink:0}
.ticker-scroll{overflow:hidden;flex:1}
.ticker-text{font-size:12px;color:#ffaaaa;white-space:nowrap;display:inline-block;animation:tick 30s linear infinite}
@keyframes tick{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}.trending{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
.trending::-webkit-scrollbar{display:none}
.trend-label{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:600}
.chip{white-space:nowrap;font-size:12px;padding:4px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s;flex-shrink:0}
.chip:hover{border-color:#444;color:var(--text)}
.feed{padding:0 16px;max-width:680px;margin:0 auto;padding-bottom:80px}
.section-head{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:16px 0 10px}
/* FEATURED */
.feat-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:6px;cursor:pointer;transition:border-color .2s}
.feat-card:hover{border-color:#333}
.feat-top{background:linear-gradient(135deg,#1a0a0a,#1a1015);padding:24px 18px;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.feat-cat-badge{position:absolute;top:14px;left:14px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase}
.feat-title{font-size:18px;font-weight:700;line-height:1.4;color:#fff;margin-bottom:4px}
.feat-body{padding:14px}
.feat-summary{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.feat-summary.loading{color:var(--text3);font-style:italic}
/* LIST CARD */
.news-card{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.news-card:hover{opacity:.8}
.news-card:last-child{border-bottom:none}
.card-num{font-size:22px;font-weight:800;color:var(--bg4);min-width:28px;padding-top:2px;line-height:1}
.card-body{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.card-src{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.3px}
.card-time{font-size:11px;color:var(--text3)}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.b-break{background:rgba(230,57,70,.2);color:var(--accent)}
.b-trend{background:rgba(255,165,0,.15);color:#ffa500}
.card-title{font-size:15px;font-weight:600;line-height:1.4;color:var(--text);margin-bottom:6px}
.card-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;max-height:60px;overflow:hidden;transition:max-height .3s}
.card-summary.expanded{max-height:300px}
.card-summary.loading{color:var(--text3);font-style:italic}
.card-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.act-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.act-btn:hover{border-color:#444;color:var(--text)}
.act-btn.liked{border-color:var(--accent);color:var(--accent)}
.act-btn.saved{border-color:#ffa500;color:#ffa500}
.read-link{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;margin-left:auto;white-space:nowrap}
/* SHIMMER */
.shimmer{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* PANEL */
.panel{position:fixed;inset:0;background:var(--bg);z-index:150;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
.panel.open{transform:translateX(0)}
.panel-header{background:rgba(10,10,10,.97);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0}
.panel-header h2{font-size:18px;font-weight:700}
.close-btn{background:transparent;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;cursor:pointer;color:var(--text3);font-size:10px;gap:3px;border:none;background:transparent;transition:color .2s;position:relative}
.nav-item span:first-child{font-size:20px}
.nav-item.active{color:var(--accent)}
.nbadge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--accent);color:#fff;font-size:9px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty div{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px;color:var(--text2);margin-bottom:6px}
.refresh-btn{margin-top:16px;background:var(--accent);border:none;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}
body.light{--bg:#f5f5f5;--bg2:#fff;--bg3:#f0f0f0;--bg4:#e4e4e4;--border:#e0e0e0;--text:#111;--text2:#555;--text3:#999}
body.light .feat-top{background:linear-gradient(135deg,#ffe0e0,#fff0f5)}
body.light .feat-title{color:#111}
body.light .ticker-wrap{background:#fff5f5;border-color:#ffd0d0}
body.light .ticker-text{color:#c0392b}
</style>
</head>
<body>
<header>
  <div class="logo">Snap<span>Brief</span></div>
  <div class="header-right">
    <span class="live-dot"></span>
    <button class="icon-btn" id="searchToggle">🔍</button>
    <button class="icon-btn" id="themeBtn">🌙</button>
    <button class="icon-btn" id="refreshBtn" title="Refresh">🔄</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <div class="search-wrap">
    <span style="color:var(--text3)">🔍</span>
    <input id="searchInput" type="text" placeholder="Search headlines..." oninput="onSearch(this.value)"/>
    <span style="color:var(--text3);cursor:pointer" onclick="closeSearch()">✕</span>
  </div>
</div>

<div class="ticker-wrap" id="ticker">
  <span class="ticker-label">🔴 LIVE</span>
  <div class="ticker-scroll"><span class="ticker-text" id="tickerText">Loading latest headlines...</span></div>
</div>

<div class="cats" id="cats"></div>

<div class="trending" id="trendRow">
  <span class="trend-label">🔥 Trending:</span>
</div>

<div class="feed" id="feed"></div>

<div class="panel" id="savedPanel">
  <div class="panel-header">
    <button class="close-btn" onclick="closePanel()">←</button>
    <h2>🔖 Saved Stories</h2>
  </div>
  <div style="padding:0 16px;padding-bottom:80px" id="savedFeed"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="switchNav('home')"><span>🏠</span><span>Home</span></button>
  <button class="nav-item" id="nav-search" onclick="switchNav('search')"><span>🔍</span><span>Explore</span></button>
  <button class="nav-item" id="nav-saved" onclick="switchNav('saved')" style="position:relative"><span>🔖</span><span>Saved</span><span class="nbadge" id="nbadge" style="display:none">0</span></button>
  <button class="nav-item" id="nav-theme" onclick="toggleTheme()"><span id="themeIcon">🌙</span><span>Theme</span></button>
</nav>

<script>
const CATS=[{id:'top',e:'⚡',l:'Top News'},{id:'world',e:'🌍',l:'World'},{id:'india',e:'🇮🇳',l:'India'},{id:'tech',e:'💻',l:'Tech'},{id:'business',e:'📈',l:'Business'},{id:'sports',e:'⚽',l:'Sports'},{id:'entertainment',e:'🎬',l:'Entertainment'},{id:'health',e:'🏥',l:'Health'},{id:'science',e:'🔬',l:'Science'}];

const RSS_FEEDS={
  top:['https://feeds.bbci.co.uk/news/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml','https://timesofindia.indiatimes.com/rssfeedstopstories.cms'],
  world:['https://feeds.bbci.co.uk/news/world/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/World.xml'],
  india:['https://timesofindia.indiatimes.com/rssfeedstopstories.cms','https://feeds.feedburner.com/ndtvnews-top-stories'],
  tech:['https://feeds.bbci.co.uk/news/technology/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml'],
  business:['https://feeds.bbci.co.uk/news/business/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Business.xml'],
  sports:['https://feeds.bbci.co.uk/sport/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Sports.xml'],
  entertainment:['https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Arts.xml'],
  health:['https://feeds.bbci.co.uk/news/health/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Health.xml'],
  science:['https://feeds.bbci.co.uk/news/science_and_environment/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Science.xml']
};

const TRENDS={top:['AI','Economy','Climate','Elections','War'],world:['UN','Gaza','Ukraine','China','NATO'],india:['Modi','ISRO','Cricket','Monsoon','Economy'],tech:['ChatGPT','Apple','Meta','Android','Quantum'],business:['Markets','Startup','IPO','RBI','Crypto'],sports:['Cricket','Football','Olympics','F1','Wimbledon'],entertainment:['Bollywood','Netflix','Awards','Music','OTT'],health:['Cancer','Mental Health','Yoga','Diet','WHO'],science:['NASA','Mars','Physics','Climate','DNA']};

const PROXIES=['https://api.allorigins.win/get?url=','https://corsproxy.io/?','https://api.codetabs.com/v1/proxy?quest='];
let currentCat='top';
let allArticles=[];
let savedArticles=JSON.parse(localStorage.getItem('sb_saved')||'[]');
let likedSet=new Set(JSON.parse(localStorage.getItem('sb_liked')||'[]'));
let sumCache=JSON.parse(localStorage.getItem('sb_cache')||'{}');
let lightMode=localStorage.getItem('sb_theme')==='light';
let expandedIdx=new Set();

function init(){
  applyTheme();
  renderCats();
  renderTrends();
  updateBadge();
  loadFeed();
  document.getElementById('refreshBtn').onclick=()=>loadFeed(true);
  document.getElementById('searchToggle').onclick=()=>{
    const b=document.getElementById('searchBar');
    b.classList.toggle('open');
    if(b.classList.contains('open'))document.getElementById('searchInput').focus();
  };
}

function applyTheme(){
  document.body.classList.toggle('light',lightMode);
  document.getElementById('themeIcon').textContent=lightMode?'☀️':'🌙';
  document.getElementById('themeBtn').textContent=lightMode?'☀️':'🌙';
}

function toggleTheme(){
  lightMode=!lightMode;
  localStorage.setItem('sb_theme',lightMode?'light':'dark');
  applyTheme();
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>`<button class="cat${c.id===currentCat?' active':''}" onclick="switchCat('${c.id}')">${c.e} ${c.l}</button>`).join('');
}

function renderTrends(){
  const chips=(TRENDS[currentCat]||TRENDS.top).map(t=>`<span class="chip" onclick="doSearch('${t}')">#${t}</span>`).join('');
  document.getElementById('trendRow').innerHTML=`<span class="trend-label">🔥 Trending:</span>${chips}`;
}

function switchCat(cat){currentCat=cat;expandedIdx.clear();renderCats();renderTrends();loadFeed();}

function switchNav(tab){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  if(tab==='saved')openSavedPanel();
  else if(tab==='search'){document.getElementById('searchBar').classList.add('open');document.getElementById('searchInput').focus();}
  else if(tab==='home')closePanel();
}

async function fetchWithProxy(feedUrl){
  for(const proxy of PROXIES){
    try{
      const url=proxy+encodeURIComponent(feedUrl);
      const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
      if(!res.ok)continue;
      const data=await res.json();
      const xml=data.contents||data.data||data;
      if(typeof xml==='string'&&xml.includes('<item>'))return xml;
    }catch(e){}
  }
  return null;
}

async function loadFeed(forceRefresh=false){
  showShimmer();
  const feeds=RSS_FEEDS[currentCat]||RSS_FEEDS.top;
  let articles=[];
  for(const feed of feeds){
    try{
      const xml=await fetchWithProxy(feed);
      if(xml){const parsed=parseRSS(xml);articles=[...articles,...parsed];}
    }catch(e){}
  }
  if(!articles.length){showFallback();return;}
  const seen=new Set();
  articles=articles.filter(a=>{if(seen.has(a.title))return false;seen.add(a.title);return true;});
  articles=articles.slice(0,15);
  allArticles=articles;
  updateTicker(articles);
  renderFeed(articles);
}

function parseRSS(xml){
  if(!xml)return[];
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,'text/xml');
    const items=Array.from(doc.querySelectorAll('item'));
    return items.map(item=>{
      const title=item.querySelector('title')?.textContent?.trim()||'';
      const desc=item.querySelector('description')?.textContent?.replace(/<[^>]*>/g,'').trim()||'';
      const link=item.querySelector('link')?.textContent?.trim()||'#';
      const pub=item.querySelector('pubDate')?.textContent?.trim()||'';
      const src=item.querySelector('source')?.textContent||extractDomain(link);
      return{title,description:desc.substring(0,300),url:link,publishedAt:pub,source:{name:src}};
    }).filter(a=>a.title.length>10);
  }catch(e){return[];}
}

function extractDomain(url){
  try{return new URL(url).hostname.replace('www.','');}catch{return'News';}
}

function updateTicker(articles){
  const headlines=articles.slice(0,5).map(a=>a.title).join('  •  ');
  document.getElementById('tickerText').textContent=headlines;
}

function renderFeed(articles){
  const feed=document.getElementById('feed');
  if(!articles.length){showFallback();return;}
  const feat=articles[0];
  const rest=articles.slice(1);
  const featSum=sumCache[feat.title?.substring(0,40)]||'';
  feed.innerHTML=`
    <div class="section-head">⚡ Featured Story</div>
    <div class="feat-card" id="feat-card" onclick="toggleExpand('feat')">
      <div class="feat-top">
        <span class="feat-cat-badge">${CATS.find(c=>c.id===currentCat)?.e||'📰'} ${CATS.find(c=>c.id===currentCat)?.l||'News'}</span>
        <div class="feat-title">${feat.title}</div>
      </div>
      <div class="feat-body">
        <div class="card-meta">
          <span class="card-src">${feat.source?.name||'News'}</span>
          <span class="card-time">${formatTime(feat.publishedAt)}</span>
          <span class="badge b-break">🔴 Top Story</span>
        </div>
        <div class="feat-summary${featSum?'':' loading'}" id="sum-feat">${featSum||'Generating AI summary...'}</div>
        <div class="card-actions">
          <button class="act-btn${likedSet.has(feat.title)?' liked':''}" onclick="toggleLike(event,'feat',0)">♥ Like</button>
          <button class="act-btn${savedArticles.some(s=>s.title===feat.title)?' saved':''}" onclick="toggleSave(event,0)" id="save-feat">🔖 ${savedArticles.some(s=>s.title===feat.title)?'Saved':'Save'}</button>
          <button class="act-btn" onclick="doShare(event,'${esc(feat.title)}','${feat.url}')">↗ Share</button>
          <a class="read-link" href="${feat.url}" target="_blank" onclick="event.stopPropagation()">Full story →</a>
        </div>
      </div>
    </div>
    <div class="section-head">📰 Latest News</div>
    ${rest.map((a,i)=>newsCardHTML(a,i+1)).join('')}
  `;
  articles.forEach((a,i)=>summarize(a,i===0?'feat':i));
}

function newsCardHTML(a,i){
  const sum=sumCache[a.title?.substring(0,40)]||'';
  const isLiked=likedSet.has(a.title);
  const isSaved=savedArticles.some(s=>s.title===a.title);
  const badge=i===1?`<span class="badge b-trend">🔥 Trending</span>`:i===3?`<span class="badge b-break">🔴 Breaking</span>`:'';
  return`<div class="news-card" onclick="toggleExpand(${i})">
    <div class="card-num">0${i<10?i:i}</div>
    <div class="card-body">
      <div class="card-meta"><span class="card-src">${a.source?.name||'News'}</span><span class="card-time">${formatTime(a.publishedAt)}</span>${badge}</div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary${sum?'':' loading'}${expandedIdx.has(i)?' expanded':''}" id="sum-${i}">${sum||'Summarizing...'}</div>
      <div class="card-actions">
        <button class="act-btn${isLiked?' liked':''}" onclick="toggleLike(event,${i},${i})" id="like-${i}">♥</button>
        <button class="act-btn${isSaved?' saved':''}" onclick="toggleSave(event,${i})" id="save-${i}">🔖</button>
        <button class="act-btn" onclick="doShare(event,'${esc(a.title)}','${a.url}')">↗</button>
        <a class="read-link" href="${a.url}" target="_blank" onclick="event.stopPropagation()">Read →</a>
      </div>
    </div>
  </div>`;
}

function toggleExpand(i){
  const el=document.getElementById(`sum-${i}`);
  if(!el)return;
  if(i==='feat'){el.classList.toggle('expanded');return;}
  if(expandedIdx.has(i))expandedIdx.delete(i);else expandedIdx.add(i);
  el.classList.toggle('expanded',expandedIdx.has(i));
}

async function summarize(article,idx){
  const el=document.getElementById(`sum-${idx}`);
  if(!el)return;
  const key=article.title?.substring(0,40)||'';
  if(sumCache[key]){el.textContent=sumCache[key];el.classList.remove('loading');return;}
  const content=`${article.title}. ${article.description||''}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`You are a news summarizer like Inshorts. Summarize this news in exactly 2 sentences, max 55 words. Be crisp, factual, and engaging. No opinions. Start directly with the news fact.\n\nNews: "${content}"`}]})});
    const data=await res.json();
    const sum=data.content?.[0]?.text?.trim();
    if(sum){
      sumCache[key]=sum;
      try{localStorage.setItem('sb_cache',JSON.stringify(sumCache));}catch(e){}
      const el2=document.getElementById(`sum-${idx}`);
      if(el2){el2.textContent=sum;el2.classList.remove('loading');}
    }else{fallbackSum(article,idx);}
  }catch(e){fallbackSum(article,idx);}
}

function fallbackSum(article,idx){
  const el=document.getElementById(`sum-${idx}`);
  if(el){el.textContent=article.description||'Tap to read the full story.';el.classList.remove('loading');}
}

function toggleLike(e,elIdx,arrIdx){
  e.stopPropagation();
  const a=allArticles[arrIdx];if(!a)return;
  const btn=document.getElementById(`like-${elIdx}`);
  if(likedSet.has(a.title)){likedSet.delete(a.title);if(btn)btn.classList.remove('liked');showToast('Removed from liked');}
  else{likedSet.add(a.title);if(btn)btn.classList.add('liked');showToast('❤️ Liked!');}
  localStorage.setItem('sb_liked',JSON.stringify([...likedSet]));
}

function toggleSave(e,idx){
  e.stopPropagation();
  const a=allArticles[idx];if(!a)return;
  const si=savedArticles.findIndex(s=>s.title===a.title);
  const btnId=idx===0?'save-feat':`save-${idx}`;
  const btn=document.getElementById(btnId);
  if(si>-1){savedArticles.splice(si,1);if(btn){btn.classList.remove('saved');btn.textContent='🔖 Save';}showToast('Removed from saved');}
  else{savedArticles.push({...a,savedAt:new Date().toISOString()});if(btn){btn.classList.add('saved');btn.textContent='🔖 Saved';}showToast('🔖 Saved!');}
  localStorage.setItem('sb_saved',JSON.stringify(savedArticles));
  updateBadge();
}

function updateBadge(){
  const b=document.getElementById('nbadge');
  if(!b)return;
  if(savedArticles.length){b.style.display='flex';b.textContent=savedArticles.length;}
  else b.style.display='none';
}

function openSavedPanel(){
  const panel=document.getElementById('savedPanel');
  panel.classList.add('open');
  const feed=document.getElementById('savedFeed');
  if(!savedArticles.length){feed.innerHTML=`<div class="empty"><div>🔖</div><p>No saved stories yet</p><small style="color:var(--text3)">Tap 🔖 on any card to save</small></div>`;return;}
  feed.innerHTML=savedArticles.map((a,i)=>{
    const sum=sumCache[a.title?.substring(0,40)]||a.description||'';
    return`<div class="news-card">
      <div class="card-num">0${i+1}</div>
      <div class="card-body">
        <div class="card-meta"><span class="card-src">${a.source?.name||'News'}</span><span class="card-time">${formatTime(a.savedAt)}</span></div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary expanded">${sum}</div>
        <div class="card-actions">
          <button class="act-btn" onclick="removeSaved(${i})">🗑 Remove</button>
          <a class="read-link" href="${a.url}" target="_blank">Read →</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function removeSaved(i){savedArticles.splice(i,1);localStorage.setItem('sb_saved',JSON.stringify(savedArticles));updateBadge();openSavedPanel();showToast('Removed');}
function closePanel(){document.getElementById('savedPanel').classList.remove('open');document.getElementById('nav-home').classList.add('active');document.getElementById('nav-saved').classList.remove('active');}

function doSearch(q){document.getElementById('searchBar').classList.add('open');document.getElementById('searchInput').value=q;onSearch(q);}
function onSearch(q){
  if(!q.trim()){renderFeed(allArticles);return;}
  const f=allArticles.filter(a=>a.title.toLowerCase().includes(q.toLowerCase())||(a.description||'').toLowerCase().includes(q.toLowerCase()));
  renderFeed(f);
}
function closeSearch(){document.getElementById('searchBar').classList.remove('open');document.getElementById('searchInput').value='';renderFeed(allArticles);}

function showShimmer(){
  document.getElementById('feed').innerHTML=`<div class="section-head">⚡ Featured Story</div>`+
  `<div class="feat-card"><div class="feat-top shimmer" style="min-height:140px"></div><div class="feat-body"><div class="shimmer" style="height:12px;width:50%;margin-bottom:10px"></div><div class="shimmer" style="height:11px;width:100%;margin-bottom:6px"></div><div class="shimmer" style="height:11px;width:80%"></div></div></div>`+
  `<div class="section-head">📰 Latest News</div>`+
  Array(5).fill(`<div class="news-card"><div class="card-num shimmer" style="width:28px;height:28px;border-radius:4px"></div><div class="card-body"><div class="shimmer" style="height:10px;width:40%;margin-bottom:8px"></div><div class="shimmer" style="height:14px;width:100%;margin-bottom:6px"></div><div class="shimmer" style="height:13px;width:85%;margin-bottom:6px"></div><div class="shimmer" style="height:11px;width:65%"></div></div></div>`).join('');
}

function showFallback(){
  document.getElementById('feed').innerHTML=`<div class="empty"><div>📡</div><p>Could not load live news</p><small style="color:var(--text3)">Check your internet connection</small><br><button class="refresh-btn" onclick="loadFeed()">🔄 Try Again</button></div>`;
}

function formatTime(t){
  if(!t)return'';
  if(typeof t==='string'&&(t.includes('ago')||t.includes('hour')||t.includes('day')))return t;
  try{const d=new Date(t);const diff=Math.round((Date.now()-d)/60000);if(isNaN(diff))return'';if(diff<1)return'Just now';if(diff<60)return`${diff}m ago`;if(diff<1440)return`${Math.round(diff/60)}h ago`;return`${Math.round(diff/1440)}d ago`;}catch{return'';}
}

function doShare(e,title,url){
  e.stopPropagation();
  if(navigator.share)navigator.share({title:decodeURIComponent(title),url}).catch(()=>{});
  else navigator.clipboard?.writeText(url).then(()=>showToast('🔗 Link copied!'));
}

function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'').substring(0,60);}

let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
</body>
</html>
